name: Neon Database Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-neon-connection:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Test Neon Connection
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: |
        echo "Testing Neon database connection..."
        node -e "
        const { Pool } = require('pg');
        
        async function testConnection() {
          const pool = new Pool({
            connectionString: process.env.DATABASE_URL || process.env.NEON_DATABASE_URL
          });
          
          try {
            const client = await pool.connect();
            console.log('✅ Connected to Neon database');
            
            // Test basic query
            const result = await client.query('SELECT NOW()');
            console.log('✅ Query successful:', result.rows[0]);
            
            // Check if productos table exists
            const tableCheck = await client.query(\`
              SELECT EXISTS (
                SELECT FROM information_schema.tables 
                WHERE table_schema = 'public' 
                AND table_name = 'productos'
              );
            \`);
            console.log('✅ Productos table exists:', tableCheck.rows[0].exists);
            
            // Check table structure
            if (tableCheck.rows[0].exists) {
              const columns = await client.query(\`
                SELECT column_name, data_type, is_nullable 
                FROM information_schema.columns 
                WHERE table_name = 'productos' 
                ORDER BY ordinal_position
              \`);
              console.log('✅ Productos table structure:');
              columns.rows.forEach(col => {
                console.log(\`  - \${col.column_name}: \${col.data_type} (nullable: \${col.is_nullable})\`);
              });
            }
            
            await client.release();
            await pool.end();
            console.log('✅ Connection test completed successfully');
          } catch (error) {
            console.error('❌ Database connection failed:', error.message);
            process.exit(1);
          }
        }
        
        testConnection();
        "

    - name: Test Backend API
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        NODE_ENV: test
      run: |
        echo "Starting backend server for testing..."
        timeout 30s npm start &
        SERVER_PID=$!
        
        # Wait for server to start
        sleep 10
        
        # Test basic endpoints
        echo "Testing GET /api/productos..."
        curl -f http://localhost:10000/api/productos || echo "❌ GET /api/productos failed"
        
        echo "Testing POST /api/productos..."
        curl -f -X POST http://localhost:10000/api/productos \
          -H "Content-Type: application/json" \
          -d '{
            "nombre": "Test Product",
            "categoria": "Otros",
            "precio": 10.50,
            "stock": 5,
            "tipo_producto": "producido"
          }' || echo "❌ POST /api/productos failed"
        
        # Kill server
        kill $SERVER_PID 2>/dev/null || true

    - name: Database Migration Check
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      run: |
        echo "Checking database migrations..."
        node -e "
        const { Pool } = require('pg');
        
        async function checkMigrations() {
          const pool = new Pool({
            connectionString: process.env.DATABASE_URL || process.env.NEON_DATABASE_URL
          });
          
          try {
            const client = await pool.connect();
            
            // Check all required tables
            const requiredTables = ['productos', 'usuarios', 'ventas', 'historial_productos_modificaciones'];
            
            for (const table of requiredTables) {
              const result = await client.query(\`
                SELECT EXISTS (
                  SELECT FROM information_schema.tables 
                  WHERE table_schema = 'public' 
                  AND table_name = '\${table}'
                );
              \`);
              
              if (result.rows[0].exists) {
                console.log(\`✅ Table '\${table}' exists\`);
              } else {
                console.log(\`❌ Table '\${table}' missing\`);
              }
            }
            
            await client.release();
            await pool.end();
          } catch (error) {
            console.error('❌ Migration check failed:', error.message);
            process.exit(1);
          }
        }
        
        checkMigrations();
        "

  deploy-to-render:
    needs: test-neon-connection
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Trigger Render Deploy
      run: |
        echo "Deployment to Render will be triggered automatically on push to main"
        echo "Make sure your Render service is connected to this GitHub repository"
