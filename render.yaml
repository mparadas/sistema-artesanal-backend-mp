services:
  # Servicio del Backend
  - type: web
    name: agromae-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agromae-db
          property: connectionString
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: MAIL_FROM
        value: Ventas@agromae.com
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  # Base de datos PostgreSQL
  - name: agromae-db
    plan: free
    databaseName: agromae
    user: agromae_user
